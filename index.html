<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Almoxarifado</title>
</head>
<body>
    <h1>ALMOXARIFADO</h1>
    <div>

<div class="tabela">
    <form autocomplete="off">
        <div class="tabelaGeral">
            <div class="campo">
                <label for="input-nome">Nome do material</label>
                <input type="text" id="input-nome" placeholder="Ex: Seringa">
            </div>
            <div class="campo">
                <label for="input-quantidade">Quantidade</label>
                <input type="text" id="input-quantidade" placeholder="Ex: 50">
            </div>
            <input type="submit" id="btn-cadastrar" value="Cadastrar">
        </div>
    </form>
</div>


    <table id="lista-materiais">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Quantidade</th>
            </tr>
        </thead>
        <tbody id="tbody-materiais">

        </tbody>
    </table>
<script src="main.js"></script>

</body>

</html>
